<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General San Martín 3D</title>
    <!-- MapLibre GL JS CSS -->
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
</head>
<body>
    <div id="map"></div>
    
    <div id="ui-panel">
        <h1>General San Martín 3D</h1>
        <p>Vista simple del partido en perspectiva 3D.</p>
        
        <div class="controls">
            <button id="btn-3d" class="btn">Vista 3D</button>
            <button id="btn-zenith" class="btn">Vista cenital</button>
        </div>
        
        <div id="status">Cargando mapa...</div>
    </div>

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>
</body>
</html>
