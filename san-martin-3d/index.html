<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>General San Martín 3D</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="map" aria-label="Mapa 3D de General San Martín"></div>

  <section class="panel" aria-label="Controles del mapa">
    <h1>General San Martín 3D</h1>
    <p>Vista simple del partido en perspectiva 3D.</p>
    <div class="actions">
      <button id="view-3d" type="button">Vista 3D</button>
      <button id="view-top" type="button">Vista cenital</button>
    </div>
  </section>

  <div id="status" role="status" aria-live="polite">Cargando mapa...</div>
  <div id="fatal-error" role="alert" hidden>No se pudo cargar el motor del mapa.</div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="./app.js"></script>
</body>
</html>
