<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>General San Martín 3D</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="map" aria-label="Escena 3D de General San Martín"></div>

  <section class="panel" aria-label="Controles de la escena">
    <h1>General San Martín 3D</h1>
    <p>Vista simple del partido en perspectiva 3D.</p>
    <div class="actions">
      <button id="view-3d" type="button">Vista 3D</button>
      <button id="view-top" type="button">Vista cenital</button>
    </div>
  </section>

  <div class="hint">Arrastrar para orbitar · rueda para acercar</div>
  <div id="status" role="status" aria-live="polite">Cargando mapa...</div>
  <div id="fatal-error" role="alert" hidden>No se pudo cargar el motor del mapa.</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.173.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.173.0/examples/jsm/"
      }
    }
  </script>
  <script>
    window.setTimeout(function () {
      if (!window.sanMartin3DReady) {
        var status = document.getElementById("status");
        var fatal = document.getElementById("fatal-error");
        if (status) status.textContent = "Mapa cargado con advertencias";
        if (fatal) {
          fatal.textContent = "No se pudo cargar el motor del mapa.";
          fatal.hidden = false;
        }
      }
    }, 7000);
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
