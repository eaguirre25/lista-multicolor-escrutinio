<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General San Martín 3D (Google Earth)</title>
    <!-- CesiumJS CSS -->
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
</head>
<body>
    <div id="cesiumContainer"></div>
    
    <div id="ui-panel">
        <h1>General San Martín 3D</h1>
        <p>Modelo fotorrealista de Google Earth.</p>
        
        <div class="controls">
            <button id="btn-3d" class="btn">Vista 3D</button>
            <button id="btn-zenith" class="btn">Vista cenital</button>
        </div>
        
        <div id="status">Cargando Cesium...</div>
    </div>

    <!-- CesiumJS -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Cesium.js"></script>
    <script src="app.js"></script>
</body>
</html>
